name: Release Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  android:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate frontend
        run: |
          npm run build
          npm test
          npx tsc --noEmit

      - name: Decode Keystore
        env:
          KEYSTORE_CONTENT: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$KEYSTORE_CONTENT" | base64 -d > /tmp/release.keystore

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --release

      - name: Sign APK
        run: |
          APK_PATH="src-tauri/gen/android/app/build/outputs/apk/release/*-release-unsigned.apk"
          SIGNED_APK="src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk"

          # Usa jarsigner per firmare l'APK
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore /tmp/release.keystore \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            $(ls $APK_PATH 2>/dev/null | head -1) \
            "${{ secrets.ANDROID_KEYSTORE_ALIAS }}"

          # Verifica la firma
          jarsigner -verify -verbose -certs $(ls $APK_PATH 2>/dev/null | head -1)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenVolleyScout-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/*-release.apk

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          SIGNED_APK=$(ls src-tauri/gen/android/app/build/outputs/apk/release/*-release.apk 2>/dev/null | head -1)
          if [ -f "$SIGNED_APK" ]; then
            gh release upload "${{ github.ref_name }}" "$SIGNED_APK" --clobber --repo napo/openvolleyscout
            echo "✓ APK firmato uploadato sulla release"
          else
            echo "⚠ APK non trovato"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
