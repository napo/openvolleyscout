name: Release Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  android:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate frontend
        run: |
          npm run build
          npm test
          npx tsc --noEmit

      - name: Decode Keystore
        env:
          KEYSTORE_CONTENT: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$KEYSTORE_CONTENT" | base64 -d > /tmp/release.keystore

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build

      - name: Sign APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          UNSIGNED_APK=$(ls src-tauri/gen/android/app/build/outputs/apk/universal/release/*-release-unsigned.apk 2>/dev/null | head -1)
          SIGNED_APK="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-release.apk"

          if [ -z "$UNSIGNED_APK" ]; then
            echo "❌ Unsigned APK not found"
            exit 1
          fi

          # Usa apksigner per firmare l'APK (v2 schema - obbligatorio per Android 7+)
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEYSTORE_ALIAS }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"

          # Verifica la firma
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify -v "$SIGNED_APK"
          echo "✓ APK firmato con successo"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenVolleyScout-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*-release.apk

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          SIGNED_APK=$(ls src-tauri/gen/android/app/build/outputs/apk/universal/release/*-release.apk 2>/dev/null | head -1)
          if [ -f "$SIGNED_APK" ]; then
            RELEASE_APK="openvolleyscout-0.15.0_android.apk"
            cp "$SIGNED_APK" "$RELEASE_APK"
            gh release upload "${{ github.ref_name }}" "$RELEASE_APK" --clobber --repo napo/openvolleyscout
            echo "✓ APK uploaded to release"
          else
            echo "⚠ APK not found"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
