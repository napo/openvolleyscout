name: Release native builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # The Windows ffmpeg sidecar is cross-compiled with mingw-w64 on Linux:
  # building ffmpeg natively on the Windows runner would require msys2.
  ffmpeg-windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Cache ffmpeg sidecar
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          key: ffmpeg-sidecar-x86_64-pc-windows-msvc-${{ hashFiles('scripts/build-minimal-ffmpeg.sh') }}

      - name: Build minimal ffmpeg (mingw-w64 cross)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 make
          scripts/build-minimal-ffmpeg.sh x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-windows
          path: src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe

  # Creates the GitHub release once, before any platform build starts.
  # Without this, each matrix job's tauri-action step races the others to
  # create the same release on first upload — the loser gets a 422
  # "already_exists" error and its assets (e.g. the macOS aarch64 .dmg)
  # never get attached. The step is a no-op on non-tag runs, so this job
  # always succeeds and never blocks the `desktop` matrix.
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        if: github.ref_type == 'tag'

      - name: Extract this version's CHANGELOG section
        if: github.ref_type == 'tag'
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            BEGIN { found = 0 }
            /^## / {
              if (found) exit
              if ($0 ~ "^## " ver " ") { found = 1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "Native OpenVolleyScout builds." > release-notes.md
          fi

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo napo/openvolleyscout \
            --title "OpenVolleyScout ${{ github.ref_name }}" \
            --notes-file release-notes.md \
          || echo "Release ${{ github.ref_name }} already exists, continuing"

  desktop:
    needs: [ffmpeg-windows, create-release]
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    env:
      # go2rtc ships prebuilt binaries (no compile step needed, unlike ffmpeg)
      # — pin a version for reproducible builds instead of always "latest".
      GO2RTC_VERSION: v1.9.14

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Cache ffmpeg sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        id: cache-ffmpeg-linux
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          key: ffmpeg-sidecar-x86_64-unknown-linux-gnu-${{ hashFiles('scripts/build-minimal-ffmpeg.sh') }}

      - name: Build minimal ffmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04' && steps.cache-ffmpeg-linux.outputs.cache-hit != 'true'
        run: scripts/build-minimal-ffmpeg.sh x86_64-unknown-linux-gnu

      - name: Cache ffmpeg sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        id: cache-ffmpeg-macos
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/ffmpeg-${{ matrix.rust-targets }}
          key: ffmpeg-sidecar-${{ matrix.rust-targets }}-${{ hashFiles('scripts/build-minimal-ffmpeg.sh') }}

      - name: Build minimal ffmpeg (macOS)
        if: matrix.platform == 'macos-latest' && steps.cache-ffmpeg-macos.outputs.cache-hit != 'true'
        run: scripts/build-minimal-ffmpeg.sh ${{ matrix.rust-targets }}

      - name: Download ffmpeg sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-windows
          path: src-tauri/binaries

      - name: Cache go2rtc sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        id: cache-go2rtc-linux
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/go2rtc-x86_64-unknown-linux-gnu
          key: go2rtc-sidecar-x86_64-unknown-linux-gnu-${{ env.GO2RTC_VERSION }}

      - name: Download go2rtc sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04' && steps.cache-go2rtc-linux.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o src-tauri/binaries/go2rtc-x86_64-unknown-linux-gnu \
            "https://github.com/AlexxIT/go2rtc/releases/download/${{ env.GO2RTC_VERSION }}/go2rtc_linux_amd64"
          chmod +x src-tauri/binaries/go2rtc-x86_64-unknown-linux-gnu

      - name: Cache go2rtc sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        id: cache-go2rtc-macos
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/go2rtc-${{ matrix.rust-targets }}
          key: go2rtc-sidecar-${{ matrix.rust-targets }}-${{ env.GO2RTC_VERSION }}

      - name: Download go2rtc sidecar (macOS)
        if: matrix.platform == 'macos-latest' && steps.cache-go2rtc-macos.outputs.cache-hit != 'true'
        run: |
          ASSET="go2rtc_mac_amd64.zip"
          if [ "${{ matrix.rust-targets }}" = "aarch64-apple-darwin" ]; then
            ASSET="go2rtc_mac_arm64.zip"
          fi
          curl -fsSL -o /tmp/go2rtc.zip "https://github.com/AlexxIT/go2rtc/releases/download/${{ env.GO2RTC_VERSION }}/$ASSET"
          unzip -o /tmp/go2rtc.zip -d /tmp/go2rtc-extract
          mv /tmp/go2rtc-extract/go2rtc "src-tauri/binaries/go2rtc-${{ matrix.rust-targets }}"
          chmod +x "src-tauri/binaries/go2rtc-${{ matrix.rust-targets }}"

      - name: Cache go2rtc sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        id: cache-go2rtc-windows
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries/go2rtc-x86_64-pc-windows-msvc.exe
          key: go2rtc-sidecar-x86_64-pc-windows-msvc-${{ env.GO2RTC_VERSION }}

      - name: Download go2rtc sidecar (Windows)
        if: matrix.platform == 'windows-latest' && steps.cache-go2rtc-windows.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/AlexxIT/go2rtc/releases/download/${{ env.GO2RTC_VERSION }}/go2rtc_win64.zip" -OutFile go2rtc.zip
          Expand-Archive -Path go2rtc.zip -DestinationPath go2rtc-extract -Force
          Move-Item go2rtc-extract/go2rtc.exe src-tauri/binaries/go2rtc-x86_64-pc-windows-msvc.exe

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (Release Tag)
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenVolleyScout ${{ github.ref_name }}"
          releaseBody: "Native OpenVolleyScout builds."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename, upload and clean up release assets (non-Windows)
        if: github.ref_type == 'tag' && runner.os != 'Windows'
        shell: bash
        run: |
          # Strip leading 'v' from tag: v0.16.0 → 0.16.0
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # When --target <triple> is passed (macOS), bundles land in target/<triple>/release/bundle
          if [[ "${{ matrix.args }}" == *"--target"* ]]; then
            TARGET=$(echo "${{ matrix.args }}" | grep -oE '[a-z0-9_]+-[a-z0-9_]+-[a-z0-9_]+(-[a-z0-9_]+)?$')
            BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          else
            BUNDLE_DIR="src-tauri/target/release/bundle"
          fi

          upload() {
            gh release upload "${{ github.ref_name }}" "$1" --clobber --repo napo/openvolleyscout
          }

          find "$BUNDLE_DIR" -type f -name "*.deb" | while read f; do
            NEW="OpenVolleyScout-${VERSION}_amd64.deb"
            cp "$f" "$NEW" && upload "$NEW"
          done

          find "$BUNDLE_DIR" -type f -name "*.rpm" | while read f; do
            NEW="OpenVolleyScout-${VERSION}_x86_64.rpm"
            cp "$f" "$NEW" && upload "$NEW"
          done

          find "$BUNDLE_DIR" -type f -name "*.AppImage" | while read f; do
            NEW="OpenVolleyScout-${VERSION}_amd64.AppImage"
            cp "$f" "$NEW" && upload "$NEW"
          done

          find "$BUNDLE_DIR" -type f -name "*aarch64.dmg" | while read f; do
            NEW="OpenVolleyScout-${VERSION}_aarch64.dmg"
            cp "$f" "$NEW" && upload "$NEW"
          done

          find "$BUNDLE_DIR" -type f -name "*x64.dmg" | while read f; do
            NEW="OpenVolleyScout-${VERSION}_x64.dmg"
            cp "$f" "$NEW" && upload "$NEW"
          done

          # Delete original lowercase files uploaded automatically by tauri-action,
          # but keep the updater manifest/signatures/macOS update bundle
          # (latest.json, *.sig, *.tar.gz) — they aren't renamed and are
          # required for Tauri's auto-updater to work.
          # `grep` exits 1 (not an error, just "no matches") once every
          # deletable asset has already been cleaned up by an earlier job's
          # pass over this same shared release — under `set -e -o pipefail`
          # that would otherwise abort this step, so the whole pipeline is
          # allowed to fail harmlessly via the trailing `|| true`.
          gh release view "${{ github.ref_name }}" --repo napo/openvolleyscout \
            --json assets --jq '.assets[].name' \
            | grep '^openvolleyscout' \
            | grep -vE '\.sig$|\.tar\.gz$|^latest\.json$' \
            | while read asset; do
              gh release delete-asset "${{ github.ref_name }}" "$asset" \
                --yes --repo napo/openvolleyscout 2>/dev/null || true
            done || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename, upload and clean up release assets (Windows)
        if: github.ref_type == 'tag' && runner.os == 'Windows'
        shell: pwsh
        run: |
          # Strip leading 'v' from tag: v0.16.0 → 0.16.0
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          $BUNDLE_DIR = "src-tauri/target/release/bundle"

          function Upload($file) {
            gh release upload "${{ github.ref_name }}" $file --clobber --repo napo/openvolleyscout
          }

          $nsis_file = Get-ChildItem -Path "$BUNDLE_DIR/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis_file) {
            $new_name = "OpenVolleyScout-${VERSION}_x64-setup.exe"
            Copy-Item $nsis_file.FullName $new_name -Force
            Upload $new_name
          }

          $msi_file = Get-ChildItem -Path "$BUNDLE_DIR/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi_file) {
            $new_name = "OpenVolleyScout-${VERSION}_x64.msi"
            Copy-Item $msi_file.FullName $new_name -Force
            Upload $new_name
          }

          # Delete original lowercase files uploaded automatically by tauri-action,
          # but keep the updater manifest/signatures/macOS update bundle
          # (latest.json, *.sig, *.tar.gz) — they aren't renamed and are
          # required for Tauri's auto-updater to work. This step runs on the
          # shared release after every platform (including macOS) may have
          # already uploaded, so it must protect their assets too, not just
          # its own.
          $assets = (gh release view "${{ github.ref_name }}" --repo napo/openvolleyscout --json assets --jq '.assets[].name') -split "`n"
          foreach ($asset in $assets) {
            # -cmatch: PowerShell -match is case-insensitive and would also
            # delete the renamed OpenVolleyScout-* assets of the other jobs
            if ($asset -cmatch '^openvolleyscout' -and $asset -notmatch '\.sig$' -and $asset -notmatch '\.tar\.gz$' -and $asset -ne 'latest.json') {
              gh release delete-asset "${{ github.ref_name }}" $asset --yes --repo napo/openvolleyscout 2>$null
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app (Main Branch)
        if: github.ref_type != 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: "build-${{ github.run_number }}"
          releaseName: "Build #${{ github.run_number }} (main)"
          releaseBody: "Automated build from main branch."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
