name: Release native builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  desktop:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (Release Tag)
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenVolleyScout ${{ github.ref_name }}"
          releaseBody: "Native OpenVolleyScout builds."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename and upload files with correct naming convention
        if: github.ref_type == 'tag' && runner.os != 'Windows'
        shell: bash
        run: |
          VERSION=$(jq -r '.version' package.json)
          # When --target <triple> is passed (e.g. macOS), Rust places bundles under target/<triple>/release/bundle
          if [[ "${{ matrix.args }}" == *"--target"* ]]; then
            TARGET=$(echo "${{ matrix.args }}" | grep -oE '[a-z0-9_]+-[a-z0-9_]+-[a-z0-9_]+(-[a-z0-9_]+)?$')
            BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          else
            BUNDLE_DIR="src-tauri/target/release/bundle"
          fi

          # Rename files to OpenVolleyScout-VERSION_ARCH.EXT format
          # Note: Tauri generates files with OpenVolleyScout (capital O) not openvolleyscout
          find "$BUNDLE_DIR" -type f -name "*deb" | while read file; do
            basename=$(basename "$file")
            if [[ $basename =~ OpenVolleyScout_${VERSION}_amd64\.deb ]]; then
              mv "$file" "OpenVolleyScout-${VERSION}_amd64.deb"
            fi
          done

          find "$BUNDLE_DIR" -type f -name "*rpm" | while read file; do
            basename=$(basename "$file")
            if [[ $basename =~ OpenVolleyScout.*x86_64\.rpm ]]; then
              mv "$file" "OpenVolleyScout-${VERSION}_x86_64.rpm"
            fi
          done

          find "$BUNDLE_DIR" -type f -name "*AppImage" | while read file; do
            basename=$(basename "$file")
            if [[ $basename =~ OpenVolleyScout_${VERSION}_amd64\.AppImage ]]; then
              mv "$file" "OpenVolleyScout-${VERSION}_amd64.AppImage"
            fi
          done

          find "$BUNDLE_DIR" -type f -name "*aarch64.dmg" | while read file; do
            mv "$file" "OpenVolleyScout-${VERSION}_arch64.dmg"
          done

          find "$BUNDLE_DIR" -type f -name "*x64.dmg" | while read file; do
            basename=$(basename "$file")
            if [[ ! $basename =~ arch64 ]]; then
              mv "$file" "OpenVolleyScout-${VERSION}_x64.dmg"
            fi
          done

          # Upload all renamed files
          for file in OpenVolleyScout-${VERSION}_*.{deb,rpm,AppImage,dmg}; do
            if [ -f "$file" ]; then
              gh release upload "${{ github.ref_name }}" "$file" --clobber --repo napo/openvolleyscout
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and upload Windows files
        if: github.ref_type == 'tag' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          $BUNDLE_DIR = "src-tauri/target/release/bundle"

          # NSIS exe
          $nsis_file = Get-ChildItem -Path "$BUNDLE_DIR/nsis" -Filter "openvolleyscout_*_x64-setup.exe" -ErrorAction SilentlyContinue
          if ($nsis_file) {
            $new_name = "OpenVolleyScout-${VERSION}_x64-setup.exe"
            Move-Item -Path $nsis_file.FullName -Destination $new_name -Force
            gh release upload "${{ github.ref_name }}" $new_name --clobber --repo napo/openvolleyscout
          }

          # MSI
          $msi_file = Get-ChildItem -Path "$BUNDLE_DIR/msi" -Filter "openvolleyscout_*_x64_en-US.msi" -ErrorAction SilentlyContinue
          if ($msi_file) {
            $new_name = "OpenVolleyScout-${VERSION}_x64.msi"
            Move-Item -Path $msi_file.FullName -Destination $new_name -Force
            gh release upload "${{ github.ref_name }}" $new_name --clobber --repo napo/openvolleyscout
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app (Main Branch)
        if: github.ref_type != 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "build-${{ github.run_number }}"
          releaseName: "Build #${{ github.run_number }} (main)"
          releaseBody: "Automated build from main branch."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}