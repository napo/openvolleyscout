name: Release native builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  desktop:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: "x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (Release Tag)
        if: github.ref_type == 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenVolleyScout ${{ github.ref_name }}"
          releaseBody: "Native OpenVolleyScout builds."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename and upload files with correct naming convention
        if: github.ref_type == 'tag'
        run: |
          VERSION=$(jq -r '.version' package.json)
          BUNDLE_DIR="src-tauri/target/release/bundle"

          # Rename and upload files with OpenVolleyScout-VERSION_ARCH.EXT format
          if [ -f "$BUNDLE_DIR/deb/openvolleyscout_${VERSION}_amd64.deb" ]; then
            mv "$BUNDLE_DIR/deb/openvolleyscout_${VERSION}_amd64.deb" "OpenVolleyScout-${VERSION}_amd64.deb"
            gh release upload "${{ github.ref_name }}" "OpenVolleyScout-${VERSION}_amd64.deb" --clobber --repo napo/openvolleyscout
          fi

          if [ -f "$BUNDLE_DIR/rpm/openvolleyscout-${VERSION}-1.x86_64.rpm" ]; then
            mv "$BUNDLE_DIR/rpm/openvolleyscout-${VERSION}-1.x86_64.rpm" "OpenVolleyScout-${VERSION}_x86_64.rpm"
            gh release upload "${{ github.ref_name }}" "OpenVolleyScout-${VERSION}_x86_64.rpm" --clobber --repo napo/openvolleyscout
          fi

          if [ -f "$BUNDLE_DIR/appimage/openvolleyscout_${VERSION}_amd64.AppImage" ]; then
            mv "$BUNDLE_DIR/appimage/openvolleyscout_${VERSION}_amd64.AppImage" "OpenVolleyScout-${VERSION}_amd64.AppImage"
            gh release upload "${{ github.ref_name }}" "OpenVolleyScout-${VERSION}_amd64.AppImage" --clobber --repo napo/openvolleyscout
          fi

          if [ -f "$BUNDLE_DIR/dmg/openvolleyscout_${VERSION}_aarch64.dmg" ]; then
            mv "$BUNDLE_DIR/dmg/openvolleyscout_${VERSION}_aarch64.dmg" "OpenVolleyScout-${VERSION}_arch64.dmg"
            gh release upload "${{ github.ref_name }}" "OpenVolleyScout-${VERSION}_arch64.dmg" --clobber --repo napo/openvolleyscout
          fi

          if [ -f "$BUNDLE_DIR/dmg/openvolleyscout_${VERSION}_x64.dmg" ]; then
            mv "$BUNDLE_DIR/dmg/openvolleyscout_${VERSION}_x64.dmg" "OpenVolleyScout-${VERSION}_x64.dmg"
            gh release upload "${{ github.ref_name }}" "OpenVolleyScout-${VERSION}_x64.dmg" --clobber --repo napo/openvolleyscout
          fi

          if [ -f "$BUNDLE_DIR/nsis/openvolleyscout_${VERSION}_x64-setup.exe" ]; then
            mv "$BUNDLE_DIR/nsis/openvolleyscout_${VERSION}_x64-setup.exe" "OpenVolleyScout-${VERSION}_x64-setup.exe"
            gh release upload "${{ github.ref_name }}" "OpenVolleyScout-${VERSION}_x64-setup.exe" --clobber --repo napo/openvolleyscout
          fi

          if [ -f "$BUNDLE_DIR/msi/openvolleyscout_${VERSION}_x64_en-US.msi" ]; then
            mv "$BUNDLE_DIR/msi/openvolleyscout_${VERSION}_x64_en-US.msi" "OpenVolleyScout-${VERSION}_x64.msi"
            gh release upload "${{ github.ref_name }}" "OpenVolleyScout-${VERSION}_x64.msi" --clobber --repo napo/openvolleyscout
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Tauri app (Main Branch)
        if: github.ref_type != 'tag'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "build-${{ github.run_number }}"
          releaseName: "Build #${{ github.run_number }} (main)"
          releaseBody: "Automated build from main branch."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}